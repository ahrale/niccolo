<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#111">
<meta name="apple-mobile-web-app-title" content="니끌로">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<title>니끌로</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; }
  body {
    background:#111; color:#eee;
    font-family:-apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
    display:flex; flex-direction:column;
    padding-bottom:env(safe-area-inset-bottom);
  }
  header {
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 16px; padding-top:calc(8px + env(safe-area-inset-top));
  }
  header h1 { font-size:16px; font-weight:600; }
  button {
    background:#2a2a2a; color:#eee; border:none; border-radius:8px;
    padding:8px 14px; font-size:14px; font-family:inherit;
  }
  button:active { opacity:.7; }
  button.primary { background:#0a84ff; font-weight:600; }
  button.on { background:#eee; color:#111; font-weight:600; }
  #stage { flex:1; min-height:0; display:flex; align-items:center; justify-content:center; padding:0 4px; position:relative; overflow:hidden; }
  #canvas { max-width:100%; max-height:100%; touch-action:none; }
  #cmpBtn {
    position:absolute; right:16px; bottom:12px; border-radius:20px; padding:8px 16px;
    background:rgba(40,40,40,.85); font-size:13px;
    -webkit-touch-callout:none; -webkit-user-select:none; user-select:none; touch-action:none;
  }
  #empty { position:absolute; inset:0; display:flex; flex-direction:column; gap:12px; align-items:center; justify-content:center; color:#888; font-size:15px; }
  #empty button { padding:14px 28px; font-size:16px; }
  .strip { display:flex; gap:6px; overflow-x:auto; padding:6px 12px; -webkit-overflow-scrolling:touch; }
  .strip::-webkit-scrollbar { display:none; }
  .fitem { flex:0 0 auto; text-align:center; font-size:10px; color:#aaa; }
  .fitem canvas { width:52px; height:52px; border-radius:8px; border:2px solid transparent; display:block; margin-bottom:2px; }
  .fitem.sel canvas { border-color:#0a84ff; }
  .fitem.sel { color:#0a84ff; }
  #adjust { padding:0 16px; }
  #atabs { display:flex; gap:6px; }
  #atabs button { flex:1; padding:6px 0; font-size:13px; color:#aaa; background:none; }
  #atabs button.on { color:#fff; background:#2a2a2a; }
  .srow { display:flex; align-items:center; gap:10px; font-size:13px; }
  .srow output { width:34px; text-align:right; color:#aaa; flex:none; font-size:12px; }
  input[type=range] { flex:1; accent-color:#0a84ff; height:30px; }
  #cropbar { display:none; gap:8px; padding:6px 12px; overflow-x:auto; }
  #cropbar.show { display:flex; }
  #cropbar button { flex:0 0 auto; }
  #photos { border-top:1px solid #222; }
  #photos .pitem { flex:0 0 auto; position:relative; }
  #photos canvas { width:48px; height:48px; border-radius:6px; border:2px solid transparent; display:block; object-fit:cover; }
  #photos .pitem.sel canvas { border-color:#0a84ff; }
  #photos .pitem .x {
    position:absolute; top:-6px; right:-6px; width:20px; height:20px; border-radius:50%;
    background:#444; color:#fff; font-size:12px; line-height:20px; text-align:center;
  }
  #actions { display:flex; gap:8px; padding:6px 16px 10px; }
  #actions button { flex:1; padding:11px; font-size:15px; }
  #toast {
    position:fixed; left:50%; bottom:120px; transform:translateX(-50%);
    background:#333; padding:10px 18px; border-radius:20px; font-size:14px;
    opacity:0; transition:opacity .25s; pointer-events:none; white-space:nowrap;
  }
  #toast.show { opacity:1; }
  input[type=file] { display:none; }
</style>
</head>
<body>
<header>
  <h1>니끌로</h1>
  <button id="addBtn">+ 사진 추가</button>
</header>

<div id="stage">
  <canvas id="canvas"></canvas>
  <button id="cmpBtn" style="display:none">원본</button>
  <div id="empty">
    <div>아이폰 사진을 골라 필터·보정 후<br>JPG로 저장하세요</div>
    <button class="primary" id="pickBtn">사진 선택</button>
  </div>
</div>

<div class="strip" id="filters"></div>

<div id="adjust">
  <div id="atabs">
    <button data-k="br" class="on">밝기</button>
    <button data-k="ct">대비</button>
    <button data-k="sa">채도</button>
    <button data-k="sh">선명하게</button>
  </div>
  <div class="srow"><input type="range" id="aslider" min="-100" max="100" value="0"><output>0</output></div>
</div>

<div id="cropbar">
  <button data-a="">자유</button>
  <button data-a="1">1:1</button>
  <button data-a="0.8">4:5</button>
  <button data-a="1.7778">16:9</button>
  <button data-a="0.5625" data-out="1080x1920">1080×1920</button>
  <button id="cropReset">초기화</button>
</div>

<div class="strip" id="photos"></div>

<div id="actions">
  <button id="cropBtn">자르기</button>
  <button id="applyAllBtn">전체 적용</button>
  <button class="primary" id="saveBtn">저장</button>
</div>

<div id="toast"></div>
<input type="file" id="file" accept="image/*" multiple>

<script>
'use strict';

// 필터 프리셋 — 밝기/대비/채도/색온도/페이드 조합 (인스타 필터 근사)
const FILTERS = {
  '원본':      { br:0,  ct:0,  sa:0,  temp:0,   fade:0 },
  'Clarendon': { br:5,  ct:25, sa:35, temp:-8,  fade:0 },
  'Gingham':   { br:8,  ct:-8, sa:-15,temp:5,   fade:0.18 },
  'Juno':      { br:4,  ct:10, sa:30, temp:12,  fade:0 },
  'Lark':      { br:12, ct:-5, sa:12, temp:-5,  fade:0 },
  'Valencia':  { br:10, ct:8,  sa:10, temp:15,  fade:0.08 },
};
const PREVIEW_MAX = 1400, THUMB = 64, JPEG_Q = 0.9;
const defSettings = () => ({ filter:'원본', br:0, ct:0, sa:0, sh:0, crop:{x:0,y:0,w:1,h:1}, aspect:null, outSize:null });

const photos = [];   // { file, name, preview:canvas, settings }
let cur = -1, cropMode = false;

const $ = id => document.getElementById(id);
const canvas = $('canvas'), ctx = canvas.getContext('2d');
const fileInput = $('file');
const RANGES = { br:[-100,100], ct:[-100,100], sa:[-100,100], sh:[0,100] };
let adjKey = 'br';
const aslider = $('aslider');

// ---------- 픽셀 파이프라인 (미리보기·내보내기 공용) ----------
function effective(s) {
  const f = FILTERS[s.filter];
  return { br:f.br+s.br, ct:f.ct+s.ct, sa:f.sa+s.sa, temp:f.temp, fade:f.fade, sh:s.sh };
}
function applyPipeline(imageData, s) {
  const e = effective(s), d = imageData.data;
  const br = 1 + e.br/100*0.7, ct = 1 + e.ct/100*0.7, sat = 1 + e.sa/100;
  const temp = e.temp*1.6, fade = e.fade;
  // 채널별 점 연산은 LUT로 (밝기→대비→색온도→페이드)
  const lut = [new Uint8ClampedArray(256), new Uint8ClampedArray(256), new Uint8ClampedArray(256)];
  const shift = [temp, 0, -temp];
  for (let c = 0; c < 3; c++) for (let i = 0; i < 256; i++) {
    let v = i*br;
    v = (v-128)*ct + 128 + shift[c];
    v = v*(1-fade) + 128*fade;
    lut[c][i] = v;
  }
  for (let i = 0; i < d.length; i += 4) {
    let r = d[i], g = d[i+1], b = d[i+2];
    if (sat !== 1) {
      const y = 0.299*r + 0.587*g + 0.114*b;
      r = y + (r-y)*sat; g = y + (g-y)*sat; b = y + (b-y)*sat;
      r = r<0?0:r>255?255:r; g = g<0?0:g>255?255:g; b = b<0?0:b>255?255:b;
    }
    d[i] = lut[0][r|0]; d[i+1] = lut[1][g|0]; d[i+2] = lut[2][b|0];
  }
  if (e.sh > 0) sharpen(imageData, e.sh/100*0.8);
  return imageData;
}
function sharpen(imageData, k) { // 상하좌우 언샤프 마스크
  const { data:d, width:w, height:h } = imageData;
  const src = new Uint8ClampedArray(d);
  const c0 = 1 + 4*k;
  for (let y = 1; y < h-1; y++) {
    let i = (y*w+1)*4;
    for (let x = 1; x < w-1; x++, i += 4) {
      for (let c = 0; c < 3; c++) {
        const j = i+c;
        d[j] = src[j]*c0 - k*(src[j-4] + src[j+4] + src[j-w*4] + src[j+w*4]);
      }
    }
  }
}

// ---------- 사진 로드 ----------
const loadImg = (img, url) => new Promise((res, rej) => { img.onload = res; img.onerror = () => rej(new Error('decode')); img.src = url; });
async function addFiles(files) {
  let failed = 0;
  for (const file of files) {
    const url = URL.createObjectURL(file);
    const img = new Image();
    try { await loadImg(img, url); } catch { failed++; URL.revokeObjectURL(url); continue; }
    const scale = Math.min(1, PREVIEW_MAX / Math.max(img.naturalWidth, img.naturalHeight));
    const preview = document.createElement('canvas');
    preview.width = Math.round(img.naturalWidth*scale);
    preview.height = Math.round(img.naturalHeight*scale);
    preview.getContext('2d').drawImage(img, 0, 0, preview.width, preview.height);
    URL.revokeObjectURL(url);
    photos.push({ file, name: file.name.replace(/\.[^.]+$/, ''), preview, settings: defSettings() });
  }
  if (failed) toast(`${failed}장은 지원하지 않는 형식이라 제외했어요`);
  if (photos.length) select(cur < 0 ? 0 : cur);
  renderPhotoStrip();
  $('empty').style.display = photos.length ? 'none' : 'flex';
  $('cmpBtn').style.display = photos.length ? '' : 'none';
}

// ---------- 미리보기 렌더 ----------
// 드래그 중엔 저해상도로 즉시 반응, 손 떼면 고해상도로 정리
let raf = 0, settleTimer = 0;
const render = () => schedule(false);
const renderFast = () => {
  schedule(true);
  clearTimeout(settleTimer);
  settleTimer = setTimeout(() => schedule(false), 160);
};
function schedule(fast) {
  cancelAnimationFrame(raf);
  raf = requestAnimationFrame(() => renderNow(fast));
}
function renderNow(fast) {
  if (cur < 0) return;
  if (cropMode) return renderCrop();
  // 일반 모드: 잘린 결과만 표시 (iOS 사진 앱과 동일)
  const p = photos[cur], s = p.settings, c = s.crop;
  const pw = p.preview.width, ph = p.preview.height;
  const cw = c.w*pw, ch = c.h*ph;
  const scale = fast ? Math.min(1, 640 / Math.max(cw, ch)) : 1;
  canvas.width = Math.round(cw*scale);
  canvas.height = Math.round(ch*scale);
  ctx.drawImage(p.preview, c.x*pw, c.y*ph, cw, ch, 0, 0, canvas.width, canvas.height);
  const id = ctx.getImageData(0, 0, canvas.width, canvas.height);
  ctx.putImageData(applyPipeline(id, s), 0, 0);
}

// ---------- Crop 모드 (iOS 사진 앱 방식: 프레임 고정, 사진이 아래에서 움직임) ----------
const stageEl = $('stage');
let cropView = null; // { s, dx, dy, Fx, Fy, Fw, Fh } — 캔버스 px 기준 이미지 배율·위치와 프레임
const qFactor = () => canvas.width / Math.max(1, stageEl.clientWidth - 8); // 화면 1px → 캔버스 px
function fitCrop() { // 현재 crop이 프레임을 가득 채우도록 이미지 배율·위치 계산
  const p = photos[cur], c = p.settings.crop;
  const pw = p.preview.width, ph = p.preview.height;
  const M = 14 * qFactor();
  const availW = canvas.width - 2*M, availH = canvas.height - 2*M;
  const A = (c.w*pw)/(c.h*ph);
  let Fw = availW, Fh = Fw/A;
  if (Fh > availH) { Fh = availH; Fw = Fh*A; }
  const Fx = (canvas.width-Fw)/2, Fy = (canvas.height-Fh)/2;
  const s = Fw/(c.w*pw);
  cropView = { s, dx: Fx - c.x*pw*s, dy: Fy - c.y*ph*s, Fx, Fy, Fw, Fh };
}
function cropFrame() { // 이미지 변환 기준 현재 crop의 화면 위치
  const p = photos[cur], c = p.settings.crop, v = cropView;
  return { x: c.x*p.preview.width*v.s + v.dx, y: c.y*p.preview.height*v.s + v.dy,
           w: c.w*p.preview.width*v.s, h: c.h*p.preview.height*v.s };
}
function renderCrop() {
  // ponytail: crop 모드는 고정 해상도(≤2x) 단일 경로 — 제스처 중 해상도 전환 시 좌표계가 흔들려서
  const p = photos[cur], se = p.settings;
  const q = Math.min(window.devicePixelRatio || 1, 2);
  const W = Math.round(Math.max(50, stageEl.clientWidth - 8)*q);
  const H = Math.round(Math.max(50, stageEl.clientHeight)*q);
  if (canvas.width !== W || canvas.height !== H) { canvas.width = W; canvas.height = H; cropView = null; }
  if (!cropView) fitCrop();
  const v = cropView;
  ctx.clearRect(0, 0, W, H);
  ctx.drawImage(p.preview, v.dx, v.dy, p.preview.width*v.s, p.preview.height*v.s);
  const id = ctx.getImageData(0, 0, W, H);
  ctx.putImageData(applyPipeline(id, se), 0, 0);
  const F = cropFrame(), k = qFactor();
  ctx.fillStyle = 'rgba(0,0,0,.5)';
  ctx.fillRect(0, 0, W, F.y); ctx.fillRect(0, F.y+F.h, W, H-F.y-F.h);
  ctx.fillRect(0, F.y, F.x, F.h); ctx.fillRect(F.x+F.w, F.y, W-F.x-F.w, F.h);
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5*k;
  ctx.strokeRect(F.x, F.y, F.w, F.h);
  ctx.strokeStyle = 'rgba(255,255,255,.45)'; ctx.lineWidth = 1*k;
  for (let i = 1; i < 3; i++) { // 3분할 안내선
    ctx.beginPath(); ctx.moveTo(F.x+F.w*i/3, F.y); ctx.lineTo(F.x+F.w*i/3, F.y+F.h); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(F.x, F.y+F.h*i/3); ctx.lineTo(F.x+F.w, F.y+F.h*i/3); ctx.stroke();
  }
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 4*k; ctx.lineCap = 'butt';
  const L = 18*k, o = 2*k; // 코너 브래킷
  for (const [cx0, cy0, sx, sy] of [[F.x-o,F.y-o,1,1],[F.x+F.w+o,F.y-o,-1,1],[F.x-o,F.y+F.h+o,1,-1],[F.x+F.w+o,F.y+F.h+o,-1,-1]]) {
    ctx.beginPath();
    ctx.moveTo(cx0+sx*L, cy0); ctx.lineTo(cx0, cy0); ctx.lineTo(cx0, cy0+sy*L);
    ctx.stroke();
  }
}

// ---------- 핀치 줌 (보기 전용 — 내보내기엔 영향 없음) ----------
const view = { z:1, tx:0, ty:0 };
const pointers = new Map();
let pinch0 = null, pan0 = null;
function applyView() {
  canvas.style.transform = view.z === 1 ? '' : `translate(${view.tx}px, ${view.ty}px) scale(${view.z})`;
}
function clampPan() { // 사진이 화면 밖으로 다 나가지 않게
  const mx = canvas.offsetWidth*(view.z-1)/2, my = canvas.offsetHeight*(view.z-1)/2;
  view.tx = clamp(view.tx, -mx, mx); view.ty = clamp(view.ty, -my, my);
}
function resetView() { view.z = 1; view.tx = view.ty = 0; applyView(); }

// ---------- Crop 조작 + 핀치 (포인터) ----------
let drag = null;
canvas.addEventListener('pointerdown', ev => {
  if (cur < 0) return;
  try { canvas.setPointerCapture(ev.pointerId); } catch {}
  pointers.set(ev.pointerId, { x: ev.clientX, y: ev.clientY });
  if (pointers.size === 2) { // 두 손가락 → 핀치 시작 (드래그 취소)
    drag = null; pan0 = null;
    const [a, b] = [...pointers.values()];
    const r = canvas.getBoundingClientRect();
    pinch0 = {
      d: Math.hypot(a.x-b.x, a.y-b.y) || 1,
      mid: { x:(a.x+b.x)/2, y:(a.y+b.y)/2 },
      z: view.z, tx: view.tx, ty: view.ty,
      cx: r.left + r.width/2 - view.tx, cy: r.top + r.height/2 - view.ty,
      crop: cropMode && cropView ? { c0:{...photos[cur].settings.crop}, v0:{...cropView} } : null,
    };
    return;
  }
  if (cropMode) {
    if (!cropView) return;
    const pt = toCanvas(ev), F = cropFrame();
    const grab = 34*qFactor();
    const corners = { tl:[F.x,F.y], tr:[F.x+F.w,F.y], bl:[F.x,F.y+F.h], br:[F.x+F.w,F.y+F.h] };
    drag = null;
    for (const k in corners)
      if (Math.abs(pt.x-corners[k][0]) < grab && Math.abs(pt.y-corners[k][1]) < grab) {
        drag = { type:'corner', mode:k, start:pt, F0:{...F}, v0:{...cropView} }; return;
      }
    drag = { type:'pan', start:pt, c0:{...photos[cur].settings.crop} }; // 프레임 고정, 사진이 움직임
  } else if (view.z > 1) { // 확대 상태에서 한 손가락 → 이동
    pan0 = { x: ev.clientX, y: ev.clientY, tx: view.tx, ty: view.ty };
  }
});
canvas.addEventListener('pointermove', ev => {
  if (pointers.has(ev.pointerId)) pointers.set(ev.pointerId, { x: ev.clientX, y: ev.clientY });
  if (pinch0 && pointers.size >= 2) {
    const [a, b] = [...pointers.values()];
    const d = Math.hypot(a.x-b.x, a.y-b.y) || 1;
    const mid = { x:(a.x+b.x)/2, y:(a.y+b.y)/2 };
    if (pinch0.crop) { // crop 모드: 프레임 고정, 사진을 프레임 안으로 확대/축소
      const p = photos[cur], c = p.settings.crop, v = cropView;
      const pw = p.preview.width, ph = p.preview.height;
      const { c0, v0 } = pinch0.crop;
      let k = d/pinch0.d;
      k = Math.max(k, c0.w, c0.h);     // 크롭이 사진보다 커지지 않게
      k = Math.min(k, c0.w/0.03);      // 과도 확대 방지
      const r = canvas.getBoundingClientRect();
      const toC = pt2 => ({ x:(pt2.x-r.left)*canvas.width/r.width, y:(pt2.y-r.top)*canvas.height/r.height });
      const m = toC(mid), m0 = toC(pinch0.mid);
      const s2 = v0.s*k;
      const imgX = (m0.x - v0.dx)/v0.s, imgY = (m0.y - v0.dy)/v0.s; // 중점 아래 사진 좌표 고정
      const dx2 = m.x - imgX*s2, dy2 = m.y - imgY*s2;
      c.w = c0.w/k; c.h = c0.h/k;
      c.x = clamp((v0.Fx - dx2)/(s2*pw), 0, 1-c.w);
      c.y = clamp((v0.Fy - dy2)/(s2*ph), 0, 1-c.h);
      Object.assign(v, { s: s2, dx: v0.Fx - c.x*pw*s2, dy: v0.Fy - c.y*ph*s2 });
      renderFast();
    } else { // 일반 모드: 보기 줌
      view.z = clamp(pinch0.z * d/pinch0.d, 1, 4);
      const s = view.z/pinch0.z; // 두 손가락 중점 고정 + 이동
      view.tx = mid.x - pinch0.cx - (pinch0.mid.x - pinch0.cx - pinch0.tx)*s;
      view.ty = mid.y - pinch0.cy - (pinch0.mid.y - pinch0.cy - pinch0.ty)*s;
      clampPan(); applyView();
    }
    return;
  }
  if (pan0) {
    view.tx = pan0.tx + (ev.clientX - pan0.x);
    view.ty = pan0.ty + (ev.clientY - pan0.y);
    clampPan(); applyView();
    return;
  }
  if (!drag) return;
  const pt = toCanvas(ev);
  const p = photos[cur], c = p.settings.crop, v = cropView;
  const pw = p.preview.width, ph = p.preview.height;
  if (drag.type === 'pan') { // 사진이 손가락을 따라 움직임 → crop은 반대 방향
    c.x = clamp(drag.c0.x - (pt.x - drag.start.x)/(v.s*pw), 0, 1-c.w);
    c.y = clamp(drag.c0.y - (pt.y - drag.start.y)/(v.s*ph), 0, 1-c.h);
    v.dx = v.Fx - c.x*pw*v.s;
    v.dy = v.Fy - c.y*ph*v.s;
  } else { // 코너: 프레임 리사이즈 (사진 고정) — 놓으면 다시 화면을 채움
    const R = p.settings.aspect, F0 = drag.F0, v0 = drag.v0;
    const dxp = pt.x - drag.start.x, dyp = pt.y - drag.start.y;
    const minS = 44*qFactor();
    const ix1 = v0.dx, iy1 = v0.dy, ix2 = v0.dx + pw*v0.s, iy2 = v0.dy + ph*v0.s; // 사진 경계
    let x1 = F0.x, y1 = F0.y, x2 = F0.x+F0.w, y2 = F0.y+F0.h;
    if (drag.mode.includes('l')) x1 = clamp(F0.x+dxp, ix1, x2-minS);
    if (drag.mode.includes('r')) x2 = clamp(F0.x+F0.w+dxp, x1+minS, ix2);
    if (drag.mode.includes('t')) y1 = clamp(F0.y+dyp, iy1, y2-minS);
    if (drag.mode.includes('b')) y2 = clamp(F0.y+F0.h+dyp, y1+minS, iy2);
    if (R) { // 비율 고정 — 세로를 맞추고, 사진 경계에 닿으면 가로를 되돌림
      if (drag.mode.includes('t')) {
        y1 = y2-(x2-x1)/R;
        if (y1 < iy1) { y1 = iy1; const w2 = (y2-y1)*R; if (drag.mode.includes('l')) x1 = x2-w2; else x2 = x1+w2; }
      } else {
        y2 = y1+(x2-x1)/R;
        if (y2 > iy2) { y2 = iy2; const w2 = (y2-y1)*R; if (drag.mode.includes('l')) x1 = x2-w2; else x2 = x1+w2; }
      }
    }
    c.x = (x1-v0.dx)/(v0.s*pw); c.y = (y1-v0.dy)/(v0.s*ph);
    c.w = (x2-x1)/(v0.s*pw); c.h = (y2-y1)/(v0.s*ph);
  }
  renderFast();
});
const endPointer = ev => {
  pointers.delete(ev.pointerId);
  if (pointers.size < 2) pinch0 = null;
  pan0 = null;
  if (drag) {
    if (drag.type === 'corner') cropView = null; // 놓으면 새 크롭이 화면을 다시 채움 (iOS 방식)
    drag = null;
    render();
  }
  if (view.z <= 1.05 && view.z !== 1) resetView(); // 원래 크기 근처면 스냅백
};
canvas.addEventListener('pointerup', endPointer);
canvas.addEventListener('pointercancel', endPointer);
function toCanvas(ev) {
  const r = canvas.getBoundingClientRect();
  return { x:(ev.clientX-r.left)*canvas.width/r.width, y:(ev.clientY-r.top)*canvas.height/r.height };
}
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;

function setAspect(R, outSize) { // R = w/h 픽셀 비율(null=자유), outSize = "1080x1920" 등 내보내기 고정 크기
  const p = photos[cur], s = p.settings;
  s.aspect = R;
  s.outSize = outSize || null;
  if (R) { // 최대 크기로 중앙 배치
    const W = p.preview.width, H = p.preview.height;
    let w = 1, h = W/R/H;
    if (h > 1) { h = 1; w = R*H/W; }
    s.crop = { x:(1-w)/2, y:(1-h)/2, w, h };
  }
  cropView = null;
  render();
  updateCropbar();
}
function updateCropbar() {
  const a = cur >= 0 ? photos[cur].settings.aspect : null;
  document.querySelectorAll('#cropbar [data-a]').forEach(b =>
    b.classList.toggle('on', String(a ?? '') === b.dataset.a));
}

// ---------- UI ----------
function syncSlider() {
  const v = cur >= 0 ? photos[cur].settings[adjKey] : 0;
  aslider.min = RANGES[adjKey][0]; aslider.max = RANGES[adjKey][1];
  aslider.value = v; aslider.nextElementSibling.value = v;
}
function select(i) {
  cur = i;
  resetView();
  cropView = null;
  syncSlider();
  renderFilterStrip();
  renderPhotoStrip();
  updateCropbar();
  render();
}
function renderFilterStrip() {
  const el = $('filters');
  el.innerHTML = '';
  if (cur < 0) return;
  const p = photos[cur];
  for (const name in FILTERS) {
    const item = document.createElement('div');
    item.className = 'fitem' + (p.settings.filter === name ? ' sel' : '');
    const c = document.createElement('canvas');
    const sc = Math.max(THUMB/p.preview.width, THUMB/p.preview.height);
    c.width = c.height = THUMB;
    const cc = c.getContext('2d');
    cc.drawImage(p.preview, (p.preview.width*sc-THUMB)/-2, (p.preview.height*sc-THUMB)/-2, p.preview.width*sc, p.preview.height*sc);
    cc.putImageData(applyPipeline(cc.getImageData(0,0,THUMB,THUMB), { ...defSettings(), filter:name }), 0, 0);
    item.append(c, document.createTextNode(name));
    item.onclick = () => { p.settings.filter = name; renderFilterStrip(); render(); };
    el.appendChild(item);
  }
}
function renderPhotoStrip() {
  const el = $('photos');
  el.innerHTML = '';
  photos.forEach((p, i) => {
    const item = document.createElement('div');
    item.className = 'pitem' + (i === cur ? ' sel' : '');
    const c = document.createElement('canvas');
    const sc = Math.max(56/p.preview.width, 56/p.preview.height);
    c.width = c.height = 56;
    c.getContext('2d').drawImage(p.preview, (p.preview.width*sc-56)/-2, (p.preview.height*sc-56)/-2, p.preview.width*sc, p.preview.height*sc);
    const x = document.createElement('div');
    x.className = 'x'; x.textContent = '✕';
    x.onclick = ev => {
      ev.stopPropagation();
      photos.splice(i, 1);
      if (!photos.length) { cur = -1; canvas.width = canvas.height = 0; $('empty').style.display = 'flex'; $('cmpBtn').style.display = 'none'; renderPhotoStrip(); $('filters').innerHTML = ''; }
      else select(Math.min(cur, photos.length-1));
    };
    item.append(c, x);
    item.onclick = () => select(i);
    el.appendChild(item);
  });
}
function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._h);
  t._h = setTimeout(() => t.classList.remove('show'), 2200);
}

$('addBtn').onclick = $('pickBtn').onclick = () => fileInput.click();
fileInput.onchange = () => { addFiles([...fileInput.files]); fileInput.value = ''; };

document.querySelectorAll('#atabs button').forEach(b => b.onclick = () => {
  adjKey = b.dataset.k;
  document.querySelectorAll('#atabs button').forEach(x => x.classList.toggle('on', x === b));
  syncSlider();
});
aslider.oninput = () => {
  if (cur < 0) return;
  photos[cur].settings[adjKey] = +aslider.value;
  aslider.nextElementSibling.value = aslider.value;
  renderFast();
};

// 길게 누르는 동안 원본 표시 (보정 전후 비교)
const cmpBtn = $('cmpBtn');
cmpBtn.addEventListener('pointerdown', ev => {
  ev.preventDefault();
  if (cur < 0) return;
  cancelAnimationFrame(raf); clearTimeout(settleTimer);
  const p = photos[cur];
  canvas.width = p.preview.width; canvas.height = p.preview.height;
  ctx.drawImage(p.preview, 0, 0);
});
const cmpEnd = () => { if (cur >= 0) render(); };
cmpBtn.addEventListener('pointerup', cmpEnd);
cmpBtn.addEventListener('pointercancel', cmpEnd);
cmpBtn.addEventListener('pointerleave', cmpEnd);

$('cropBtn').onclick = () => {
  if (cur < 0) return;
  cropMode = !cropMode;
  $('cropBtn').classList.toggle('on', cropMode);
  $('cropBtn').textContent = cropMode ? '완료' : '자르기';
  $('cropbar').classList.toggle('show', cropMode);
  cmpBtn.style.display = cropMode || !photos.length ? 'none' : '';
  resetView();
  cropView = null;
  render();
};
document.querySelectorAll('#cropbar [data-a]').forEach(b =>
  b.onclick = () => setAspect(b.dataset.a ? +b.dataset.a : null, b.dataset.out));
$('cropReset').onclick = () => {
  if (cur < 0) return;
  Object.assign(photos[cur].settings, { crop:{x:0,y:0,w:1,h:1}, aspect:null, outSize:null });
  cropView = null;
  render(); updateCropbar();
};

$('applyAllBtn').onclick = () => {
  if (cur < 0) return;
  const s = photos[cur].settings;
  photos.forEach((p, i) => { // crop은 사진별 구도가 달라 제외
    if (i !== cur) Object.assign(p.settings, { filter:s.filter, br:s.br, ct:s.ct, sa:s.sa, sh:s.sh });
  });
  toast(`${photos.length}장에 필터·보정 적용됨`);
};

// ---------- 내보내기 ----------
$('saveBtn').onclick = async () => {
  if (!photos.length) return;
  const btn = $('saveBtn');
  btn.disabled = true;
  try {
    const files = [];
    for (let i = 0; i < photos.length; i++) {
      btn.textContent = `변환 중 ${i+1}/${photos.length}`;
      await new Promise(r => setTimeout(r)); // UI 갱신 양보
      files.push(await exportPhoto(photos[i]));
    }
    btn.textContent = '저장';
    if (navigator.canShare && navigator.canShare({ files })) {
      await navigator.share({ files }).catch(e => { if (e.name !== 'AbortError') throw e; });
    } else {
      for (const f of files) {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(f);
        a.download = f.name;
        a.click();
        await new Promise(r => setTimeout(r, 300));
        URL.revokeObjectURL(a.href);
      }
      toast(`${files.length}장 다운로드됨`);
    }
  } catch (e) {
    toast('저장 실패: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '저장';
  }
};
async function exportPhoto(p) {
  // 원본 해상도로 다시 디코드 (메모리 절약 — 한 장씩)
  const url = URL.createObjectURL(p.file);
  const img = new Image();
  await loadImg(img, url);
  const c = p.settings.crop;
  const W = img.naturalWidth, H = img.naturalHeight;
  const out = p.settings.outSize ? p.settings.outSize.split('x').map(Number) : null; // 고정 크기 프리셋 (예: 1080x1920)
  const cv = document.createElement('canvas');
  cv.width = out ? out[0] : Math.round(c.w*W);
  cv.height = out ? out[1] : Math.round(c.h*H);
  const cx = cv.getContext('2d');
  cx.drawImage(img, c.x*W, c.y*H, c.w*W, c.h*H, 0, 0, cv.width, cv.height);
  URL.revokeObjectURL(url);
  cx.putImageData(applyPipeline(cx.getImageData(0, 0, cv.width, cv.height), p.settings), 0, 0);
  const blob = await new Promise(r => cv.toBlob(r, 'image/jpeg', JPEG_Q));
  return new File([blob], `${p.name}_edited.jpg`, { type:'image/jpeg' });
}
</script>
</body>
